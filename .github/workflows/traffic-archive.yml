name: Archive GitHub Traffic Data

on:
  schedule:
    # Runs daily at 06:00 UTC — GitHub traffic API retains only 14 days
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  archive-traffic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and archive traffic data
        env:
          GITHUB_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          REPO_OWNER: mohamedyaakoubi
          REPO_NAME: MohamedYakoubi
        run: |
          set -e
          
          DATE=$(date -u +"%Y-%m-%d")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ARCHIVE_DIR="traffic-data"
          mkdir -p "$ARCHIVE_DIR"
          
          echo "📊 Fetching traffic data for $REPO_OWNER/$REPO_NAME on $DATE..."
          
          # Fetch clones (14-day window)
          CLONES=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/traffic/clones")
          
          # Fetch views (14-day window)
          VIEWS=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/traffic/views")
          
          # Fetch referrers (top 10)
          REFERRERS=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/traffic/popular/referrers")
          
          # Fetch popular paths (top 10)
          PATHS=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/traffic/popular/paths")
          
          # Save raw daily snapshot
          cat > "$ARCHIVE_DIR/snapshot-$DATE.json" << EOF
          {
            "fetched_at": "$TIMESTAMP",
            "clones": $CLONES,
            "views": $VIEWS,
            "referrers": $REFERRERS,
            "popular_paths": $PATHS
          }
          EOF
          
          # Pretty-print summary to log
          echo ""
          echo "=== CLONE SUMMARY ==="
          echo "$CLONES" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(f\"Total clones (14d): {data.get('count', 'N/A')}\")
          print(f\"Unique cloners (14d): {data.get('uniques', 'N/A')}\")
          for entry in data.get('clones', []):
              print(f\"  {entry['timestamp'][:10]}: {entry['count']} clones, {entry['uniques']} unique\")
          "
          
          echo ""
          echo "=== VIEW SUMMARY ==="
          echo "$VIEWS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(f\"Total views (14d): {data.get('count', 'N/A')}\")
          print(f\"Unique viewers (14d): {data.get('uniques', 'N/A')}\")
          for entry in data.get('views', []):
              print(f\"  {entry['timestamp'][:10]}: {entry['count']} views, {entry['uniques']} unique\")
          "
          
          echo ""
          echo "=== REFERRERS ==="
          echo "$REFERRERS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for ref in data:
              print(f\"  {ref['referrer']}: {ref['count']} total, {ref['uniques']} unique\")
          "
          
          echo ""
          echo "=== CLONE-TO-VIEW RATIO ==="
          python3 -c "
          import json
          clones = json.loads('''$CLONES''')
          views = json.loads('''$VIEWS''')
          c = clones.get('count', 0)
          v = views.get('count', 1)  # avoid div by zero
          cu = clones.get('uniques', 0)
          vu = views.get('uniques', 1)
          ratio = c / v if v > 0 else 'inf'
          uratio = cu / vu if vu > 0 else 'inf'
          print(f'Clone/View ratio: {ratio:.1f}x (total), {uratio:.1f}x (unique)')
          if isinstance(ratio, float) and ratio > 5:
              print('⚠️  ALERT: Clone-to-view ratio is abnormally high — likely bot activity')
          if cu > 50:
              print(f'⚠️  ALERT: {cu} unique cloners in 14 days is unusually high for a personal portfolio')
          "
          
          # Append to cumulative CSV — backfill ALL days from snapshot not already in CSV
          CSV_FILE="$ARCHIVE_DIR/traffic-log.csv"
          
          # Create CSV header if file doesn't exist
          if [ ! -f "$CSV_FILE" ]; then
            echo "date,clones,unique_clones,views,unique_views,clone_view_ratio,top_referrer" > "$CSV_FILE"
          fi
          
          # Write API data to temp files for Python to read
          echo "$CLONES" > /tmp/clones.json
          echo "$VIEWS" > /tmp/views.json
          echo "$REFERRERS" > /tmp/referrers.json
          
          CSV_PATH="$CSV_FILE" python3 -c "
          import json, os
          
          with open('/tmp/clones.json') as f: clones_data = json.load(f)
          with open('/tmp/views.json') as f: views_data = json.load(f)
          with open('/tmp/referrers.json') as f: referrers_data = json.load(f)
          csv_file = os.environ['CSV_PATH']
          
          existing_dates = set()
          if os.path.exists(csv_file):
              with open(csv_file) as f:
                  for line in f:
                      if line.strip() and not line.startswith('date'):
                          existing_dates.add(line.split(',')[0])
          
          clone_by_date = {e['timestamp'][:10]: (e['count'], e['uniques']) for e in clones_data.get('clones', [])}
          view_by_date = {e['timestamp'][:10]: (e['count'], e['uniques']) for e in views_data.get('views', [])}
          top_ref = referrers_data[0]['referrer'] if referrers_data else 'none'
          
          all_dates = sorted(set(list(clone_by_date.keys()) + list(view_by_date.keys())))
          
          new_rows = []
          for date in all_dates:
              if date in existing_dates:
                  continue
              c, cu = clone_by_date.get(date, (0, 0))
              v, vu = view_by_date.get(date, (0, 0))
              ratio = round(c / v, 1) if v > 0 else ('inf' if c > 0 else '0')
              new_rows.append(f'{date},{c},{cu},{v},{vu},{ratio},{top_ref}')
          
          if new_rows:
              with open(csv_file, 'a') as f:
                  for row in new_rows:
                      f.write(row + '\n')
              print(f'Added {len(new_rows)} new day(s) to CSV')
          else:
              print('No new days to add to CSV')
          
          # Re-read full CSV and write summary row at the end
          lines = []
          with open(csv_file) as f:
              lines = [l.strip() for l in f if l.strip()]
          
          # Remove old summary rows
          data_lines = [l for l in lines if not l.startswith('TOTAL,') and not l.startswith('AVG/DAY,')]
          
          # Parse data rows (skip header)
          total_c = total_cu = total_v = total_vu = 0
          num_days = 0
          for line in data_lines[1:]:
              parts = line.split(',')
              if len(parts) >= 5:
                  c = int(parts[1]) if parts[1].isdigit() else 0
                  cu = int(parts[2]) if parts[2].isdigit() else 0
                  v = int(parts[3]) if parts[3].isdigit() else 0
                  vu = int(parts[4]) if parts[4].isdigit() else 0
                  total_c += c
                  total_cu += cu
                  total_v += v
                  total_vu += vu
                  num_days += 1
          
          overall_ratio = round(total_c / total_v, 1) if total_v > 0 else ('inf' if total_c > 0 else '0')
          avg_c = round(total_c / num_days, 1) if num_days > 0 else 0
          avg_v = round(total_v / num_days, 1) if num_days > 0 else 0
          
          with open(csv_file, 'w') as f:
              for line in data_lines:
                  f.write(line + '\n')
              f.write(f'TOTAL,{total_c},{total_cu},{total_v},{total_vu},{overall_ratio},-\n')
              f.write(f'AVG/DAY,{avg_c},-,{avg_v},-,-,({num_days} days)\n')
          
          print(f'Summary: {total_c} clones / {total_v} views over {num_days} days (ratio: {overall_ratio}x)')
          "
          
          echo ""
          echo "✅ Traffic data archived to $ARCHIVE_DIR/snapshot-$DATE.json"

      - name: Commit and push archived data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic-data/
          git diff --cached --quiet || git commit -m "📊 Traffic archive: $(date -u +%Y-%m-%d)"
          git push
